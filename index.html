<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多圈圆环图</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0f0f23;
  color: #e0e0e0;
  font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  min-height: 100vh;
}
.header {
  text-align: center;
  padding: 48px 20px 32px;
}
.header h1 {
  font-size: 28px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 8px;
}
.header p {
  font-size: 14px;
  color: #888;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
  max-width: 900px;
  margin: 0 auto;
  padding: 0 20px 48px;
}
.card {
  background: #16162a;
  border: 1px solid #2a2a4a;
  border-radius: 8px;
  padding: 20px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  text-decoration: none;
  color: inherit;
  display: block;
}
.card:hover {
  border-color: #4A90D9;
  background: #1a1a3a;
}
.card .icon {
  font-size: 32px;
  margin-bottom: 12px;
}
.card .name {
  font-size: 15px;
  font-weight: bold;
  color: #fff;
  margin-bottom: 6px;
}
.card .desc {
  font-size: 12px;
  color: #888;
  line-height: 1.5;
}
.card .tags {
  display: flex;
  gap: 6px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.tag {
  background: #1e1e3a;
  border: 1px solid #2a2a4a;
  border-radius: 10px;
  padding: 2px 10px;
  font-size: 11px;
  color: #aaa;
}
.footer {
  text-align: center;
  padding: 24px;
}
.footer a {
  display: inline-block;
  padding: 10px 28px;
  background: #4A90D9;
  border-radius: 6px;
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  font-weight: bold;
  margin: 0 8px;
}
.footer a.editor {
  background: transparent;
  border: 1px solid #4A90D9;
  color: #4A90D9;
}
.footer a:hover { opacity: 0.85; }
</style>
</head>
<body>

<div class="header">
  <h1>多圈圆环图</h1>
  <p>Multi-Level Donut Chart — 多层级数据占比可视化</p>
</div>

<div class="grid">
  <a class="card" href="chart.html?sample=supermarket">
    <div class="icon">🛒</div>
    <div class="name">超市销售占比</div>
    <div class="desc">粮油·水果·饮料三级分类销售构成</div>
    <div class="tags"><span class="tag">3层</span><span class="tag">3大类</span><span class="tag">层级不均</span></div>
  </a>
  <a class="card" href="chart.html?sample=budget">
    <div class="icon">💰</div>
    <div class="name">公司预算分配</div>
    <div class="desc">研发·市场·运营·销售预算分布</div>
    <div class="tags"><span class="tag">3层</span><span class="tag">4大类</span><span class="tag">层级不均</span></div>
  </a>
</div>

<div class="footer">
  <a class="editor" href="editor.html">打开数据编辑器</a>
</div>

</body>
</html>
